<VirtualHost *:80>
    ServerName api-monitor.local
    DocumentRoot "/opt/api_monitor/frontend"

    <Directory "/opt/api_monitor/frontend">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory "/opt/api_monitor/frontend/assets">
        Require all granted
    </Directory>

    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/api-monitor-error.log
    CustomLog ${APACHE_LOG_DIR}/api-monitor-access.log combined

    # Uncomment and adjust the following block if you use PHP-FPM instead of mod_php
    #<FilesMatch "\.php$">
    #    SetHandler "proxy:unix:/run/php/php-fpm.sock|fcgi://localhost/"
    #</FilesMatch>
</VirtualHost>
